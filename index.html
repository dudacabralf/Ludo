<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Antigravity Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.9.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.9.1/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Smooth transitions for SVG elements */
        svg * {
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Iniciando Motor Antigravity...</p>
    </div>

    <h1>Ludo Antigravity</h1>

    <div id="game-container">
        <!-- SVG Board will be generated here by Python -->
        <svg id="board-svg" viewBox="0 0 600 600" width="600" height="600">
            <defs>
                <radialGradient id="grad-red" cx="30%" cy="30%" r="50%">
                    <stop offset="0%" style="stop-color:#ff7e7e;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff3e3e;stop-opacity:1" />
                </radialGradient>
                <radialGradient id="grad-blue" cx="30%" cy="30%" r="50%">
                    <stop offset="0%" style="stop-color:#7ebfff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#2c9aff;stop-opacity:1" />
                </radialGradient>
                <radialGradient id="grad-green" cx="30%" cy="30%" r="50%">
                    <stop offset="0%" style="stop-color:#7effb2;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
                </radialGradient>
                <radialGradient id="grad-yellow" cx="30%" cy="30%" r="50%">
                    <stop offset="0%" style="stop-color:#fff17e;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#f1c40f;stop-opacity:1" />
                </radialGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                    <feOffset dx="2" dy="2" result="offsetblur" />
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.5" />
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
        </svg>

        <div class="controls">
            <div id="status-display" class="status-card">
                <h2 id="turn-title" style="margin-top: 0;">Turno do Vermelho</h2>
                <p id="game-msg">Lançar o dado para começar!</p>
            </div>

            <div id="die-container">
                <div id="die-face">?</div>
                <button id="roll-btn" py-click="roll_dice">Lançar Dado</button>
            </div>

            <div class="score-board">
                <!-- Can add scores here -->
            </div>
        </div>
    </div>

    <!-- Core Game Logic -->
    <script type="py" src="./main.py" config="./pyscript.json"></script>

    <div style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.5;">
        Criado com Antigravity Engine & PyScript
    </div>
</body>

</html>
